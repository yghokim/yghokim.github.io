research_statement:
  text: >-
    My research is at the intersection of Personal Health Informatics and Human-Computer Interaction (HCI).
    I design, develop, and evaluate Personal Informatics (PI) technologies that empower people to better learn
    about themselves and make positive changes in their behaviors and thoughts. Recently, I have investigated
    how we can leverage (generative) AIs in PI systems to acknowledge and account for the lifelong challenges
    of marginalized populations.
  themes:
    - AI for Health & Well-being
    - AI for Marginalized Populations
    - Personal Informatics

